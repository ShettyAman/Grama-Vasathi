# Project-wide Gradle settings.
# Added timeouts and disabled keepAlive to handle network instability
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8 -Dhttp.keepAlive=false -Dhttps.keepAlive=false -Dsun.net.client.defaultConnectTimeout=60000 -Dsun.net.client.defaultReadTimeout=60000

org.gradle.parallel=true
org.gradle.caching=true
android.useAndroidX=true
kotlin.code.style=official
android.nonTransitiveRClass=true

# Disable VFS watching which can cause issues on some Windows setups
org.gradle.vfs.watch=false

# Increase Kotlin daemon memory and stability
kotlin.daemon.jvmargs=-Xmx2048M -Dfile.encoding=UTF-8
